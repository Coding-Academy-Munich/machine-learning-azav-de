<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO Liste</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #2d3748;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            background-color: #4a5568;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            gap: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .button-panel {
            background-color: #718096;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 140px;
        }

        .button-panel button {
            background-color: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 12px 20px;
            cursor: pointer;
            transition: background-color 0.2s;
            border-radius: 4px;
        }

        .button-panel button:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .todo-list-panel {
            background-color: #718096;
            border-radius: 8px;
            padding: 20px;
            min-width: 250px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            color: white;
            font-size: 18px;
        }

        .todo-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #4299e1;
        }

        .todo-item.done span {
            text-decoration: line-through;
            opacity: 0.7;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background-color: #4a5568;
            padding: 24px;
            border-radius: 8px;
            min-width: 300px;
        }

        .modal h3 {
            color: white;
            margin-bottom: 16px;
        }

        .modal input[type="text"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .modal-buttons .cancel {
            background-color: #718096;
            color: white;
        }

        .modal-buttons .confirm {
            background-color: #4299e1;
            color: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function TodoApp() {
            const [todos, setTodos] = useState([
                { id: 1, text: 'TODO Item 1', done: true },
                { id: 2, text: 'TODO Item 2', done: false },
                { id: 3, text: 'TODO Item 3', done: false },
                { id: 4, text: 'TODO Item 4', done: true },
                { id: 5, text: 'TODO Item 5', done: false },
                { id: 6, text: 'TODO Item 6', done: false },
            ]);
            const [showModal, setShowModal] = useState(false);
            const [newTodoText, setNewTodoText] = useState('');

            const handleNewTodo = () => {
                setNewTodoText('');
                setShowModal(true);
            };

            const handleAddTodo = () => {
                if (newTodoText.trim()) {
                    const newId = Math.max(...todos.map(t => t.id), 0) + 1;
                    setTodos([...todos, { id: newId, text: newTodoText.trim(), done: false }]);
                }
                setShowModal(false);
                setNewTodoText('');
            };

            const handleToggleTodo = (id) => {
                setTodos(todos.map(todo =>
                    todo.id === id ? { ...todo, done: !todo.done } : todo
                ));
            };

            const handleMarkDone = () => {
                setTodos(todos.map(todo => ({ ...todo, done: true })));
            };

            const handleDelete = () => {
                setTodos(todos.filter(todo => !todo.done));
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') {
                    handleAddTodo();
                }
            };

            return (
                <div className="app-container">
                    <div className="button-panel">
                        <button onClick={handleNewTodo}>New Todo</button>
                        <button onClick={handleMarkDone}>Mark Done</button>
                        <button onClick={handleDelete}>Delete</button>
                    </div>
                    <div className="todo-list-panel">
                        {todos.map(todo => (
                            <div key={todo.id} className={`todo-item ${todo.done ? 'done' : ''}`}>
                                <input
                                    type="checkbox"
                                    checked={todo.done}
                                    onChange={() => handleToggleTodo(todo.id)}
                                />
                                <span>{todo.text}</span>
                            </div>
                        ))}
                    </div>

                    {showModal && (
                        <div className="modal-overlay" onClick={() => setShowModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h3>Neues TODO</h3>
                                <input
                                    type="text"
                                    value={newTodoText}
                                    onChange={e => setNewTodoText(e.target.value)}
                                    onKeyPress={handleKeyPress}
                                    placeholder="TODO Text eingeben..."
                                    autoFocus
                                />
                                <div className="modal-buttons">
                                    <button className="cancel" onClick={() => setShowModal(false)}>
                                        Abbrechen
                                    </button>
                                    <button className="confirm" onClick={handleAddTodo}>
                                        Hinzufügen
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TodoApp />);
    </script>
</body>
</html>
